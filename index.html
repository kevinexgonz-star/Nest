<!-- ╔══════════════════════════════════════════════════════════════╗
     ║  ROTULA NEST v29 — Nesting · Editor · Capas · Presupuesto  ║
     ║  v23: pinch-zoom táctil en el editor + iconos en pestañas.   ║
     ║  v24: FIX — el editor expande las cantidades (Cant) igual    ║
     ║  que el nesting (antes mostraba 1 objeto por pieza); pinch   ║
     ║  restaura arrastres a medias y puntos de polilínea fantasma. ║
     ║  v25: pestaña Editor FUSIONADA en Nesting — botón "✎ Modo    ║
     ║  editor" carga el nesting calculado en sus posiciones        ║
     ║  exactas para edición manual en la misma zona; el editor     ║
     ║  permanece montado (no pierdes ediciones al alternar).       ║
     ║  v26: FIX duplicación — "Presupuesto" desde el editor        ║
     ║  REEMPLAZA la lista (el lienzo es el trabajo); "Importar y   ║
     ║  editar" y "Modo editor" nestean PRIMERO (editor = nesting   ║
     ║  siempre); barra de progreso global con % (nesting, apertura ║
     ║  del editor); el motor cede el hilo → UI fluida; tope 100%   ║
     ║  en aprovechamiento por placa.                                ║
     ║  v27: parser PDF VECTORIAL (getOperatorList) — extrae los    ║
     ║  trazados reales (rects, Béziers, transforms), descarta los  ║
     ║  clips de página, capa por color; las piezas PDF ya son      ║
     ║  vectores editables. Raster solo como fallback (escaneados). ║
     ║  Fallback a rectángulo en el editor para piezas sin vector.  ║
     ║  v28: header delgado (~36px) al estilo de la barra del ERP.  ║
     ║  v29: optimización de rendimiento — batch getBBox (N reflows ║
     ║  → 1 en parseSVG), máscaras rasterizadas en paralelo (lotes  ║
     ║  de 8 con Promise.all), Union-Find en agrupación DXF, yields ║
     ║  consolidados (1 cada 5 piezas), barra de progreso con ETA   ║
     ║  visible también durante la carga/parsing del archivo.       ║
     ║  v30: modo MOTOR NFP (DeepNest) opt-in vía servicio Node     ║
     ║  (rotula-nest-engine, POST /nest). Grid sigue por defecto y  ║
     ║  como fallback. Activar: window.__ROTULA_ENGINE__.enabled.   ║
     ║  v31: FIX export — doble resta del origen del viewBox en     ║
     ║  pieceToPolylinesMM lanzaba piezas rotadas a coords negativas ║
     ║  de miles (dispersas en Aspire/CAM). Ahora export == preview. ║
     ║  v31b: demo nueva — 46 formas variadas (estrellas, engranajes,║
     ║  anillos, lunas, cruces, flechas, letras, blobs cóncavos),    ║
     ║  67 instancias, 11 con hueco. Vectoriales reales, no rects.   ║
     ║  v31c: FIX preview — demo sin svgContent caía a <rect> (cajas ║
     ║  en vez de formas). + piezas grandes geométricas (~80% placa).║
     ║  + logo de página a 30px.                                     ║
     ║  v31d: piezas en colores (paleta COLORS) — relleno suave 0.28 ║
     ║  + contorno del mismo color en el preview. svgRaw conserva    ║
     ║  relleno sólido para el mask; svgContent hereda el color.     ║
     ║                                                              ║
     ║  NUEVO v22 (sobre v21): capas de corte (Corte / Hendido /   ║
     ║  Cajeado / Taladros + personalizadas) asignables por pieza,  ║
     ║  por contorno o desde el editor; detección automática al     ║
     ║  importar (color SVG/AI o capa DXF); offset interior de      ║
     ║  cajeado (ClipperLib, 5mm editable) conservando la línea     ║
     ║  original; DXF R12 por capas y SVG plano por capas; tiempo   ║
     ║  estimado de fresado y aprovechamiento por placa; "Placa     ║
     ║  fija" por pieza; nesting automático tras importar/enviar.   ║
     ║                                                              ║
     ║  Archivo standalone: se abre directamente en Chrome.         ║
     ║  No requiere servidor, Node, ni npm. Requiere internet en    ║
     ║  la carga (CDN: React, pdf.js, Babel, opentype, ClipperLib). ║
     ║                                                              ║
     ║  Formatos soportados: SVG, DXF, PDF, AI (Illustrator)       ║

/* Stock: en móvil, tablas -> tarjetas apiladas (sin scroll lateral). Desktop intacto. */
@media (max-width: 640px) {
  .stk-scroll { overflow-x: visible !important; border: 0 !important; border-radius: 0 !important; }
  table.stk-table thead { display: none; }
  table.stk-table, table.stk-table tbody, table.stk-table tr, table.stk-table td { display: block; width: auto; }
  table.stk-table tr { border: 1px solid #eee; border-radius: 10px; margin-bottom: 8px; padding: 4px 12px; background: #fff; }
  table.stk-table td { border: 0 !important; padding: 5px 0 !important; display: flex !important; justify-content: space-between; align-items: center; gap: 12px; text-align: right !important; min-height: 30px; }
  table.stk-table td::before { color: #999; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; font-weight: 700; text-align: left; flex: 0 0 auto; }
  table.stk-table td:first-child { font-weight: 700; padding-top: 6px !important; justify-content: flex-start; }
  table.stk-fc td:nth-child(2)::before { content: "Consumo/día"; }
  table.stk-fc td:nth-child(3)::before { content: "Cobertura"; }
  table.stk-fc td:nth-child(4)::before { content: "Se agota"; }
  table.stk-fc td:nth-child(5)::before { content: "Pedir antes"; }
  table.stk-fc td:nth-child(6)::before { content: "Balance"; }
  table.stk-fc td:nth-child(7)::before { content: "Comprar"; }
  table.stk-ex td:nth-child(2)::before { content: "Stock"; }
  table.stk-ex td:nth-child(3)::before { content: "Mín"; }
  table.stk-ex td:nth-child(4)::before { content: "Uso"; }
  table.stk-ex td:nth-child(5)::before { content: "Estado"; }
  table.stk-ex td:nth-child(6)::before { content: "Pedir"; }
}
